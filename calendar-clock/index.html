<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ABIZARD CALENDAR CLOCK</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="calendar-box">

    <div class="title">
        ABIZARD CALENDAR HUD
    </div>


    <div id="time">
        00:00:00
    </div>


    <div id="date">
        Jumat, 17 Juli 2026
    </div>


    <div class="calendar">

        <div class="month">
            JULY 2026
        </div>


        <div class="days">
            Mo Tu We Th Fr Sa Su
        </div>


        <div class="numbers">
            13 14 15 16 17 18 19
            <br>
            20 21 22 23 24 25 26
        </div>

    </div>


</div>


<script src="script.js"></script>


</body>

</html>
