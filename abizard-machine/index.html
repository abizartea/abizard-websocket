<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>ABIZARD MUSIC PLAYER PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="overlay">


    <!-- SETTINGS -->
    <div id="settingsPanel">

        <h3>Pengaturan</h3>


        <label>
            🔑 YouTube API Key
        </label>

        <input 
            id="apiKey"
            type="password"
            placeholder="AIzaSyDRsO4h45b-HD3hNbuPenWyZ_z0obb9smA">


        <button id="saveKey" class="uploadBtn">
            💾 Simpan API Key
        </button>



        <label class="uploadBtn">

            🖼 Upload Background

            <input
                type="file"
                id="bgUpload"
                accept="image/*"
                hidden>

        </label>


        <button id="resetBg" class="uploadBtn">
            🔄 Reset Background
        </button>


    </div>



    <!-- SEARCH -->
    <div class="search">

        <input
            id="query"
            placeholder="Cari lagu YouTube...">

        <button id="searchBtn">
            Cari
        </button>

    </div>



    <!-- HASIL PENCARIAN -->
    <div id="search-result"></div>




    <!-- PLAYER -->
    <div class="player">


        <div
            id="disk"
            class="disk">
        </div>



        <div class="info">


            <div
                id="title"
                class="title">

                Belum ada lagu

            </div>



            <div
                id="channel"
                class="channel">

                ABIZARD MUSIC

            </div>



            <div id="timer">

                00:00 / 00:00

            </div>



            <div class="progress">

                <div id="bar"></div>

            </div>



            <div class="controls">


                <button id="play">

                    ▶ Play

                </button>



                <button id="next">

                    ⏭ Next

                </button>


            </div>


        </div>


    </div>





    <!-- PLAYLIST -->

    <div class="playlist">


        <div class="playlist-header">


            <h3>
                PLAYLIST ANTREAN
            </h3>



            <button id="settingsBtn">

                ⚙️

            </button>


        </div>




        <div id="list"></div>



    </div>



</div>




<!-- YOUTUBE PLAYER -->

<div id="youtube"></div>



<script src="script.js"></script>


</body>
</html>
