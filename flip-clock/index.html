<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ABIZARD FLIP CLOCK</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="clock">


    <div class="digits">
        <div class="flip" id="h1">0</div>
        <div class="flip" id="h2">0</div>
    </div>


    <div class="separator">
        :
    </div>


    <div class="digits">
        <div class="flip" id="m1">0</div>
        <div class="flip" id="m2">0</div>
    </div>


    <div class="separator">
        :
    </div>


    <div class="digits">
        <div class="flip" id="s1">0</div>
        <div class="flip" id="s2">0</div>
    </div>


</div>



<script src="script.js"></script>

</body>

</html>
